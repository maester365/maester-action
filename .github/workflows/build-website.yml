# Reusable workflow to validate a Docusaurus website build using npm ci and npm run build.
# Designed to be called from other workflows (workflow_call) to validate that
# website dependency updates or documentation changes do not break the build.
#
# Example usage in maester365/maester:
#
#   on:
#     pull_request:
#       paths: ['website/**']
#
#   jobs:
#     build-website:
#       uses: maester365/maester-action/.github/workflows/build-website.yml@main
#       with:
#         working-directory: website
#
name: 🏗️ Build Website

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Path to the directory containing package.json (relative to the repository root)."
        required: false
        default: "website"
        type: string
      node-version:
        description: "Node.js version to use."
        required: false
        default: "24.x"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: "Build Docusaurus website 🏗️"
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ⚙️ Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: 🏗️ Build website
        working-directory: ${{ inputs.working-directory }}
        run: npm run build
